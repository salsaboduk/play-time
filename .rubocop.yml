plugins:
  - rubocop-rails
  - rubocop-factory_bot
  - rubocop-rspec

AllCops:
  NewCops: enable

Metrics/BlockLength:
  Max: 100

Style/FrozenStringLiteralComment:
  Enabled: false

Rspec/DescribedClass:
  Enabled: false

Rspec/ImplicitExpect:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false
